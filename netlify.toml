# Netlify deployment configuration for THE VAULT

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/library"
  to = "/vault.html"
  status = 200

[[redirects]]
  from = "/forge"
  to = "/forge.html"
  status = 200

[[redirects]]
  from = "/punch"
  to = "/punch.html"
  status = 200

[[redirects]]
  from = "/api"
  to = "/api.html"
  status = 200

[[redirects]]
  from = "/tts"
  to = "/.netlify/functions/duke-tts"
  status = 200

[[redirects]]
  from = "/voices"
  to = "/.netlify/functions/duke-voices"
  status = 200
